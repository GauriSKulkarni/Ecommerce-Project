 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart - ShopEasy</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- NAVBAR -->
    <nav class="navbar">
        <div class="nav-brand">🛒 ShopEasy</div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="cart.html">Cart <span id="cart-count">0</span></a>
            <a href="login.html" id="login-btn">Login</a>
            <a href="#" id="logout-btn" style="display:none">Logout</a>
        </div>
    </nav>

    <!-- CART SECTION -->
    <div class="cart-container">
        <h2>Your Cart</h2>
        <div id="cart-items">
            <!-- Cart items loaded here -->
        </div>
        <div class="cart-summary" id="cart-summary" style="display:none">
            <h3>Order Summary</h3>
            <p>Total: <strong id="cart-total">₹0</strong></p>
            <button class="btn" onclick="placeOrder()">Place Order</button>
        </div>
    </div>

    <script src="js/cart.js"></script>
</body>
</html>
